<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sind Cooperative Housing Society, Aundh</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #0a3d2b; --green-mid: #14573d; --green-bright: #1d8a5e; --green-light: #e6f5ee;
    --gold: #c9993a; --gold-light: #f5e9cc; --cream: #faf8f3;
    --text-dark: #1a1a1a; --text-mid: #444; --text-muted: #777; --border: #ddd8cc; --white: #ffffff;
    --danger: #c0392b; --danger-light: #fdecea; --info-light: #e8f4fd; --info: #1a6fa0;
    --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); line-height: 1.6; }
 
  /* NAV */
  nav { background: var(--green-deep); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); }
  .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 64px; }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; }
  .nav-logo .crest { width: 40px; height: 40px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 16px; color: var(--green-deep); font-weight: 700; }
  .nav-logo span { font-family: 'Playfair Display', serif; color: var(--white); font-size: 15px; font-weight: 600; line-height: 1.3; }
  .nav-logo small { display: block; font-family: 'DM Sans', sans-serif; font-size: 11px; color: rgba(255,255,255,0.55); font-weight: 300; }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; font-weight: 500; transition: all 0.2s; }
  .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.12); color: #fff; }
 
  /* HERO */
  .hero { background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 60%, var(--green-bright) 100%); color: white; text-align: center; padding: 72px 24px 56px; position: relative; overflow: hidden; }
  .hero-tag { display: inline-block; background: var(--gold); color: var(--green-deep); font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 5px 16px; border-radius: 20px; margin-bottom: 20px; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 700; line-height: 1.15; margin-bottom: 16px; }
  .hero p { color: rgba(255,255,255,0.7); font-size: 16px; max-width: 480px; margin: 0 auto 32px; }
  .hero-stats { display: flex; justify-content: center; gap: 48px; flex-wrap: wrap; margin-top: 40px; padding-top: 32px; border-top: 1px solid rgba(255,255,255,0.15); }
  .hero-stat { text-align: center; }
  .hero-stat .num { font-size: 28px; font-weight: 700; font-family: 'Playfair Display', serif; color: var(--gold); }
  .hero-stat .lbl { font-size: 12px; color: rgba(255,255,255,0.55); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
 
  /* SECTIONS */
  .section { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
  .section-header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 36px; padding-bottom: 16px; border-bottom: 2px solid var(--green-light); }
  .section-eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--green-bright); margin-bottom: 6px; }
  .section-title { font-family: 'Playfair Display', serif; font-size: 2rem; font-weight: 700; color: var(--green-deep); }
  .section-divider { background: var(--green-light); height: 1px; margin: 0; border: none; }
 
  /* NOTICES */
  #notices-section { background: var(--white); }
  .notices-wrap { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
  .notice-filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 28px; }
  .filter-btn { padding: 6px 18px; border-radius: 20px; border: 1.5px solid var(--border); background: transparent; font-family: 'DM Sans', sans-serif; font-size: 13px; cursor: pointer; transition: all 0.2s; color: var(--text-mid); }
  .filter-btn.active, .filter-btn:hover { border-color: var(--green-deep); background: var(--green-deep); color: white; }
  .notice-grid { display: grid; gap: 16px; }
  .notice-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 20px 24px; background: var(--white); display: flex; gap: 20px; align-items: flex-start; transition: box-shadow 0.2s, border-color 0.2s; }
  .notice-card:hover { box-shadow: var(--shadow); border-color: #bbb; }
  .notice-card.urgent { border-left: 4px solid var(--danger); background: var(--danger-light); }
  .notice-card.general { border-left: 4px solid var(--green-bright); }
  .notice-card.info { border-left: 4px solid var(--info); background: var(--info-light); }
  .notice-icon { width: 40px; height: 40px; border-radius: 8px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .notice-icon.urgent { background: #f5c6c3; }
  .notice-icon.general { background: var(--green-light); }
  .notice-icon.info { background: #cce5f7; }
  .notice-body { flex: 1; }
  .notice-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
  .notice-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; padding: 3px 10px; border-radius: 10px; }
  .notice-badge.urgent { background: #f5c6c3; color: var(--danger); }
  .notice-badge.general { background: var(--green-light); color: var(--green-deep); }
  .notice-badge.info { background: #cce5f7; color: var(--info); }
  .notice-date { font-size: 12px; color: var(--text-muted); }
  .notice-title { font-size: 15px; font-weight: 600; color: var(--text-dark); margin-bottom: 4px; }
  .notice-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; }
 
  /* GROUNDS */
  #grounds-section { background: var(--cream); }
  .grounds-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 24px; margin-bottom: 48px; }
  .ground-card { background: var(--white); border-radius: var(--radius); border: 1px solid var(--border); overflow: hidden; box-shadow: var(--shadow); transition: transform 0.2s, box-shadow 0.2s; }
  .ground-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-lg); }
  .ground-card-img { height: 160px; display: flex; align-items: center; justify-content: center; font-size: 64px; position: relative; }
  .ground-info { padding: 20px; }
  .ground-name { font-size: 17px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
  .ground-desc { font-size: 13px; color: var(--text-muted); margin-bottom: 16px; }
  .ground-book-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; background: var(--green-deep); color: white; font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.2s; }
  .ground-book-btn:hover { background: var(--green-mid); }
 
  /* DIRECTORY */
  #directory-section { background: var(--white); }
  .dir-wrap { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
  .dir-search-bar { display: flex; gap: 12px; margin-bottom: 28px; flex-wrap: wrap; }
  .dir-search-bar input, .dir-search-bar select { flex: 1; padding: 10px 16px; border: 1.5px solid var(--border); border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none; background: var(--cream); }
  .dir-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .dir-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; background: var(--cream); }
  .dir-card-head { display: flex; align-items: center; gap: 14px; margin-bottom: 14px; }
  .dir-avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; flex-shrink: 0; }
  .av-green { background: var(--green-light); color: var(--green-deep); } .av-gold { background: var(--gold-light); color: #8a6020; } .av-blue { background: #d6eaf8; color: #154360; } .av-pink { background: #fdedee; color: #922b21; }
  .dir-name { font-size: 15px; font-weight: 600; color: var(--text-dark); }
  .dir-bungalow { display: inline-block; margin-top: 2px; font-size: 11px; font-weight: 600; letter-spacing: 1px; text-transform: uppercase; background: var(--green-deep); color: white; padding: 2px 8px; border-radius: 4px; }
  .dir-details { border-top: 1px solid var(--border); padding-top: 12px; }
