<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sind Cooperative Housing Society, Aundh</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --green-deep: #0a3d2b; --green-mid: #14573d; --green-bright: #1d8a5e; --green-light: #e6f5ee;
    --gold: #c9993a; --gold-light: #f5e9cc; --cream: #faf8f3;
    --text-dark: #1a1a1a; --text-mid: #444; --text-muted: #777; --border: #ddd8cc; --white: #ffffff;
    --danger: #c0392b; --danger-light: #fdecea; --info-light: #e8f4fd; --info: #1a6fa0;
    --radius: 12px; --shadow: 0 2px 12px rgba(0,0,0,0.08); --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text-dark); line-height: 1.6; min-height: 100vh; }
  
  /* NAV */
  nav { background: var(--green-deep); position: sticky; top: 0; z-index: 100; border-bottom: 3px solid var(--gold); }
  .nav-inner { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; height: 64px; }
  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: white; }
  .nav-logo .crest { width: 40px; height: 40px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Playfair Display', serif; font-size: 16px; color: var(--green-deep); font-weight: 700; }
  .nav-links { display: flex; gap: 4px; }
  .nav-links a { color: rgba(255,255,255,0.75); text-decoration: none; padding: 8px 16px; border-radius: 6px; font-size: 14px; transition: 0.2s; }
  .nav-links a:hover, .nav-links a.active { background: rgba(255,255,255,0.12); color: #fff; }

  /* HERO */
  .hero { background: linear-gradient(135deg, var(--green-deep) 0%, var(--green-mid) 60%, var(--green-bright) 100%); color: white; text-align: center; padding: 72px 24px; position: relative; }
  .hero h1 { font-family: 'Playfair Display', serif; font-size: 2.5rem; margin-bottom: 16px; }
  .hero-stats { display: flex; justify-content: center; gap: 40px; margin-top: 30px; }
  .num { font-size: 24px; color: var(--gold); font-weight: bold; }

  /* CONTENT */
  .section { max-width: 1100px; margin: 0 auto; padding: 60px 24px; }
  .notice-grid, .grounds-grid, .dir-grid { display: grid; gap: 20px; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); }
  
  .notice-card { border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); background: white; border-left: 5px solid var(--green-deep); }
  .notice-card.urgent { border-left-color: var(--danger); }
  
  .dir-card { background: white; border: 1px solid var(--border); padding: 20px; border-radius: var(--radius); }
  .ground-card { background: white; border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); }
  .ground-card-img { height: 150px; background: #2d9c55; display: flex; align-items: center; justify-content: center; font-size: 50px; }

  /* MODALS */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; padding: 30px; border-radius: 16px; width: 90%; max-width: 400px; }
  input, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; }
  .form-submit { background: var(--green-deep); color: white; width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; }

  .loading-text { text-align: center; color: #888; padding: 20px; grid-column: 1 / -1; }
</style>
</head>
<body>

<nav>
  <div class="nav-inner">
    <a class="nav-logo" href="#">
      <div class="crest">SC</div>
      <span>Sind Society</span>
    </a>
    <div class="nav-links">
      <a href="#notices-section">Notices</a>
      <a href="#grounds-section">Grounds</a>
      <a href="#directory-section">Directory</a>
    </div>
  </div>
</nav>

<section class="hero">
  <h1>Sind Society, Aundh</h1>
  <p>Community Portal</p>
  <div class="hero-stats">
    <div><div class="num">500+</div>Bungalows</div>
    <div><div class="num">3</div>Grounds</div>
  </div>
</section>

<div class="section" id="notices-section">
  <h2>Notices</h2>
  <div id="noticeGrid" class="notice-grid">
    <p class="loading-text">Loading notices...</p>
  </div>
</div>

<div class="section" id="grounds-section">
  <h2>Sports Grounds</h2>
  <div id="groundsGrid" class="grounds-grid">
    <p class="loading-text">Loading facilities...</p>
  </div>
</div>

<div class="section" id="directory-section">
  <h2>Directory</h2>
  <div id="dirGrid" class="dir-grid">
    <p class="loading-text">Loading residents...</p>
  </div>
</div>

<div class="modal-overlay" id="bookingModal">
  <div class="modal">
    <h3>Book Facility</h3>
    <input type="text" id="bkName" placeholder="Your Name">
    <input type="date" id="bkDate">
    <select id="bkGround"></select>
    <button class="form-submit" onclick="submitBookingRequest()">Confirm</button>
    <button style="background:none; border:none; margin-top:10px; cursor:pointer;" onclick="closeBooking()">Cancel</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAcBGrOG5cfRRSrIsSFykV8BNo2Gc0VVcU",
    authDomain: "sind-society.firebaseapp.com",
    projectId: "sind-society",
    storageBucket: "sind-society.firebasestorage.app",
    messagingSenderId: "821689204364",
    appId: "1:821689204364:web:68aa0db383e84b051145a9",
    measurementId: "G-WC6BCC1490"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // --- FETCH NOTICES ---
  async function loadNotices() {
    const grid = document.getElementById('noticeGrid');
    try {
      const snap = await getDocs(collection(db, "notices"));
      grid.innerHTML = '';
      if(snap.empty) grid.innerHTML = '<p>No notices.</p>';
      snap.forEach(doc => {
        const d = doc.data();
        grid.innerHTML += `<div class="notice-card ${d.type}">
          <strong>${d.title}</strong><br><small>${d.date}</small>
          <p>${d.description}</p>
        </div>`;
      });
    } catch(e) { grid.innerHTML = 'Error loading notices.'; }
  }

  // --- FETCH FACILITIES ---
  async function loadFacilities() {
    const grid = document.getElementById('groundsGrid');
    const dropdown = document.getElementById('bkGround');
    try {
      const snap = await getDocs(collection(db, "facilities"));
      grid.innerHTML = ''; dropdown.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        grid.innerHTML += `<div class="ground-card">
          <div class="ground-card-img">${d.icon || '🎾'}</div>
          <div style="padding:15px;">
            <strong>${d.name}</strong><p>${d.description}</p>
            <button class="form-submit" onclick="openBooking('${d.name}')">Book</button>
          </div>
        </div>`;
        dropdown.innerHTML += `<option value="${d.name}">${d.name}</option>`;
      });
    } catch(e) { grid.innerHTML = 'Error loading facilities.'; }
  }

  // --- FETCH DIRECTORY ---
  async function loadResidents() {
    const grid = document.getElementById('dirGrid');
    try {
      const snap = await getDocs(collection(db, "residents"));
      grid.innerHTML = '';
      snap.forEach(doc => {
        const d = doc.data();
        grid.innerHTML += `<div class="dir-card">
          <strong>${d.name}</strong><br>
          Bungalow: ${d.bungalow}<br>
          Phone: ${d.phone}
        </div>`;
      });
    } catch(e) { grid.innerHTML = 'Error loading residents.'; }
  }

  // --- BOOKING LOGIC ---
  window.openBooking = (val) => { 
    document.getElementById('bkGround').value = val;
    document.getElementById('bookingModal').classList.add('open'); 
  }
  window.closeBooking = () => { document.getElementById('bookingModal').classList.remove('open'); }
  
  window.submitBookingRequest = async () => {
    const n = document.getElementById('bkName').value;
    const d = document.getElementById('bkDate').value;
    const g = document.getElementById('bkGround').value;
    if(!n || !d) return alert("Fill all fields");
    await addDoc(collection(db, "bookings"), { userName: n, date: d, facility: g });
    alert("Booking sent!");
    closeBooking();
  }

  loadNotices(); loadFacilities(); loadResidents();
</script>
</body>
</html>
