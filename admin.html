<div class="admin-card">
  <h3>Post PDF Notice</h3>
  <input type="text" id="notTitle" placeholder="Notice Title">
  <input type="file" id="notFile" accept="application/pdf" style="margin: 10px 0;">
  <button class="btn btn-save" id="uploadNoticeBtn" onclick="uploadPDFNotice()">Upload & Post Notice</button>
  <p id="uploadStatus" style="font-size: 12px; color: var(--gold);"></p>
</div>

<script type="module">
  // ADD THESE TO YOUR IMPORTS AT THE TOP
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";
  
  const storage = getStorage(app);

  window.uploadPDFNotice = async () => {
    const title = document.getElementById('notTitle').value;
    const file = document.getElementById('notFile').files[0];
    const status = document.getElementById('uploadStatus');

    if (!title || !file) return alert("Please provide a title and select a PDF file.");

    try {
      status.innerText = "Uploading PDF... please wait.";
      document.getElementById('uploadNoticeBtn').disabled = true;

      // 1. Upload to Firebase Storage
      const storageRef = ref(storage, 'notices/' + file.name + "_" + Date.now());
      const snapshot = await uploadBytes(storageRef, file);
      
      // 2. Get the public link
      const downloadURL = await getDownloadURL(snapshot.ref);

      // 3. Save to Firestore Notices collection
      await addDoc(collection(db, "notices"), {
        title: title,
        pdfUrl: downloadURL,
        date: new Date().toLocaleDateString(),
        type: 'pdf'
      });

      status.innerText = "Success! Notice posted.";
      document.getElementById('notTitle').value = "";
      document.getElementById('notFile').value = "";
    } catch (e) {
      console.error(e);
      alert("Upload failed: " + e.message);
    } finally {
      document.getElementById('uploadNoticeBtn').disabled = false;
    }
  };
</script>
