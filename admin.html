<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Portal | Sind Society Sports</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0a3d2b; --bg: #faf8f3; --border: #ddd; --danger: #c0392b; --gold: #c9993a; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; }
    
    /* Login */
    #loginSection { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    #loginSection input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 6px; }
    #loginSection button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

    /* Dashboard Layout */
    #dashboardSection { display: none; display: flex; height: 100vh; }
    .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar h2 { padding: 25px; margin: 0; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .tab-btn { background: none; border: none; color: rgba(255,255,255,0.7); padding: 18px 25px; text-align: left; font-size: 15px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
    .tab-btn:hover, .tab-btn.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--gold); }
    
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* UI Cards */
    .admin-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 5px; margin-bottom: 20px; }
    
    /* Schedule Grid in Admin */
    .schedule-wrapper { overflow-x: auto; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; min-width: 1200px; font-size: 12px; }
    th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
    th { background: #f4f4f4; color: var(--primary); }
    .fac-col { background: #fafafa; font-weight: bold; text-align: left; border-right: 2px solid var(--border); width: 150px; }
    
    .status-booked { background: #fdecea; color: var(--danger); font-weight: bold; cursor: pointer; }
    .status-maint { background: #333; color: white; cursor: pointer; }
    .status-free { background: #e6f5ee; color: #2d9c55; cursor: pointer; font-weight: bold; }
    .status-free:hover { background: #c9993a; color: white; }

    .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-save { background: var(--primary); color: white; }
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="loginSection">
  <h2>Sind Admin Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Access Dashboard</button>
</div>

<div id="dashboardSection">
  <div class="sidebar">
    <h2>Management</h2>
    <button class="tab-btn active" onclick="switchTab('sports')">🏆 Sports Master</button>
    <button class="tab-btn" onclick="switchTab('notices')">📢 Notice Board</button>
    <button class="tab-btn" onclick="switchTab('residents')">👥 Residents</button>
    <button id="logoutBtn" class="tab-btn" style="margin-top:auto; color: #ff9999;">🚪 Log Out</button>
  </div>

  <div class="main-content">

    <div id="tab-sports" class="tab-content active">
      <div class="admin-card">
        <h3>Master Schedule Control</h3>
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:15px;">
            <label>View Date:</label>
            <input type="date" id="adminDateView" style="width:200px;" onchange="loadAdminSchedule()">
            <span style="font-size:12px; color:#666;">(Click <b>Available</b> to Block/Maint, click <b>Booked</b> to Cancel)</span>
        </div>
        
        <div class="schedule-wrapper">
          <table id="adminScheduleTable">
            <thead><tr id="adminHead"><th>Facility</th></tr></thead>
            <tbody id="adminBody"></tbody>
          </table>
        </div>
      </div>

      <div class="admin-card">
        <h3>Add New Ground/Facility</h3>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
          <input type="text" id="facName" placeholder="Facility Name">
          <input type="text" id="facIcon" placeholder="Emoji (🎾)">
        </div>
        <button class="btn btn-save" onclick="addFacility()">Add Facility</button>
      </div>
    </div>

    <div id="tab-notices" class="tab-content">
      <div class="admin-card"><h3>Post Notice</h3><input type="text" id="notTitle" placeholder="Title"><textarea id="notDesc" rows="3" placeholder="Text"></textarea><br><button class="btn btn-save" onclick="addNotice()">Post</button></div>
    </div>
    <div id="tab-residents" class="tab-content">
      <div class="admin-card"><h3>Add Resident</h3><input type="text" id="resName" placeholder="Name"><input type="text" id="resBung" placeholder="Bungalow"><button class="btn btn-save" onclick="addResident()">Add</button></div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAcBGrOG5cfRRSrIsSFykV8BNo2Gc0VVcU",
    authDomain: "sind-society.firebaseapp.com",
    projectId: "sind-society",
    storageBucket: "sind-society.firebasestorage.app",
    messagingSenderId: "821689204364",
    appId: "1:821689204364:web:68aa0db383e84b051145a9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const times = ["6 AM", "7 AM", "8 AM", "9 AM", "10 AM", "11 AM", "12 PM", "1 PM", "2 PM", "3 PM", "4 PM", "5 PM", "6 PM", "7 PM", "8 PM", "9 PM", "10 PM", "11 PM"];
  
  // Set default view date
  document.getElementById('adminDateView').value = new Date().toISOString().split('T')[0];

  // Build headers
  times.forEach(t => document.getElementById('adminHead').innerHTML += `<th>${t}</th>`);

  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('dashboardSection').style.display = 'flex';
      loadAdminSchedule();
    } else {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('dashboardSection').style.display = 'none';
    }
  });

  document.getElementById('loginBtn').addEventListener('click', () => {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
  });
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

  async function loadAdminSchedule() {
    const date = document.getElementById('adminDateView').value;
    const facSnap = await getDocs(collection(db, "facilities"));
    const bookSnap = await getDocs(query(collection(db, "bookings"), where("date", "==", date)));

    const bMap = {};
    bookSnap.forEach(d => bMap[`${d.data().facility}-${d.data().time}`] = { id: d.id, ...d.data() });

    const body = document.getElementById('adminBody');
    body.innerHTML = '';

    facSnap.forEach(d => {
      const f = d.data();
      let row = `<tr><td class="fac-col">${f.icon} ${f.name}</td>`;
      times.forEach(t => {
        const b = bMap[`${f.name}-${t}`];
        if(b) {
          const isMaint = b.userName === "MAINTENANCE";
          row += `<td class="${isMaint ? 'status-maint' : 'status-booked'}" onclick="adminAction('${b.id}', true)">
                    ${isMaint ? '⚠️ MAINT' : b.userName + '<br>(' + b.bungalow + ')'}
                  </td>`;
        } else {
          row += `<td class="status-free" onclick="adminAction('${f.name}|${t}|${date}', false)">Available</td>`;
        }
      });
      body.innerHTML += row + `</tr>`;
    });
  }

  window.adminAction = async (data, exists) => {
    if(exists) {
      if(confirm("Cancel this booking/block?")) {
        await deleteDoc(doc(db, "bookings", data));
        loadAdminSchedule();
      }
    } else {
      if(confirm("Mark this slot as MAINTENANCE?")) {
        const [fac, time, date] = data.split('|');
        await addDoc(collection(db, "bookings"), {
          facility: fac, time: time, date: date, userName: "MAINTENANCE", bungalow: "ADMIN"
        });
        loadAdminSchedule();
      }
    }
  };

  window.addFacility = async () => {
    await addDoc(collection(db, "facilities"), { name: document.getElementById('facName').value, icon: document.getElementById('facIcon').value });
    loadAdminSchedule();
  };

  window.addNotice = async () => {
    await addDoc(collection(db, "notices"), { title: document.getElementById('notTitle').value, description: document.getElementById('notDesc').value });
    alert("Notice Sent");
  };

  window.addResident = async () => {
    await addDoc(collection(db, "residents"), { name: document.getElementById('resName').value, bungalow: document.getElementById('resBung').value });
    alert("Resident Added");
  };

  window.switchTab = (id) => {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    event.currentTarget.classList.add('active');
  };

  window.loadAdminSchedule = loadAdminSchedule;
</script>
</body>
</html>
