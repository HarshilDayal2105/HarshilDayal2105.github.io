<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Portal | Sind Society</title>
  <style>
    body { font-family: Arial, sans-serif; background: #faf8f3; padding: 40px; }
    .container { max-width: 600px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input, button, select { width: 100%; padding: 10px; margin: 10px 0; border-radius: 6px; border: 1px solid #ccc; box-sizing: border-box; }
    button { background: #0a3d2b; color: white; cursor: pointer; font-weight: bold; border: none; font-size: 16px; transition: background 0.2s;}
    button:hover { background: #14573d; }
    .hidden { display: none; }
    hr { border: 0; border-top: 1px solid #eee; margin: 20px 0; }
  </style>
</head>
<body>

<div class="container">
  <div id="loginSection">
    <h2>Admin Login</h2>
    <input type="email" id="email" placeholder="Admin Email">
    <input type="password" id="password" placeholder="Password">
    <button id="loginBtn">Log In</button>
  </div>

  <div id="dashboardSection" class="hidden">
    <h2>Welcome, Admin</h2>
    <button id="logoutBtn" style="background: #c0392b;">Log Out</button>
    <hr>
    
    <h3>Post a Notice</h3>
    <input type="text" id="noticeTitle" placeholder="Notice Title">
    <select id="noticeType">
      <option value="general">General</option>
      <option value="urgent">Urgent</option>
      <option value="info">Info</option>
    </select>
    <input type="text" id="noticeDesc" placeholder="Description">
    <button id="addNoticeBtn">Post Notice to Website</button>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  // Your Firebase Configuration
  const firebaseConfig = {
    apiKey: "AIzaSyAcBGrOG5cfRRSrIsSFykV8BNo2Gc0VVcU",
    authDomain: "sind-society.firebaseapp.com",
    projectId: "sind-society",
    storageBucket: "sind-society.firebasestorage.app",
    messagingSenderId: "821689204364",
    appId: "1:821689204364:web:68aa0db383e84b051145a9",
    measurementId: "G-WC6BCC1490"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  // HTML Elements
  const loginSection = document.getElementById('loginSection');
  const dashboardSection = document.getElementById('dashboardSection');

  // Monitor Login State
  onAuthStateChanged(auth, (user) => {
    if (user) {
      loginSection.classList.add('hidden');
      dashboardSection.classList.remove('hidden');
    } else {
      loginSection.classList.remove('hidden');
      dashboardSection.classList.add('hidden');
    }
  });

  // Login Logic
  document.getElementById('loginBtn').addEventListener('click', () => {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, email, password).catch(err => alert(err.message));
  });

  // Logout Logic
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

  // Add Notice to Firestore
  document.getElementById('addNoticeBtn').addEventListener('click', async () => {
    const title = document.getElementById('noticeTitle').value;
    const type = document.getElementById('noticeType').value;
    const desc = document.getElementById('noticeDesc').value;
    
    if(!title || !desc) return alert("Fill all fields");

    try {
      await addDoc(collection(db, "notices"), {
        title: title,
        type: type,
        description: desc,
        date: new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })
      });
      
      alert("Notice successfully posted!");
      document.getElementById('noticeTitle').value = '';
      document.getElementById('noticeDesc').value = '';
    } catch (e) {
      alert("Error adding notice: " + e.message);
    }
  });
</script>
</body>
</html>
