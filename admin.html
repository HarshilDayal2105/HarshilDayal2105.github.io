<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin | Sind Society Control</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0a3d2b; --bg: #faf8f3; --border: #ddd; --danger: #c0392b; --gold: #c9993a; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; }
    #loginSection { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid var(--border); border-radius: 8px; }
    button { padding: 12px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
    .btn-save { background: var(--primary); color: white; width: 100%; }
    #dashboardSection { display: none; display: flex; height: 100vh; }
    .sidebar { width: 250px; background: var(--primary); color: white; display: flex; flex-direction: column; }
    .sidebar button { background: none; color: rgba(255,255,255,0.7); text-align: left; padding: 15px 25px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .sidebar button.active { background: rgba(255,255,255,0.1); color: white; }
    .main { flex: 1; padding: 40px; overflow-y: auto; }
    .tab { display: none; } .tab.active { display: block; }
    .card { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 20px; }
    table { width: 100%; border-collapse: collapse; min-width: 1000px; font-size: 12px; }
    th, td { border: 1px solid #eee; padding: 10px; text-align: center; }
    .status-maint { background: #333; color: white; cursor: pointer; }
    .status-booked { background: #fdecea; color: var(--danger); cursor: pointer; }
    .status-free { background: #e6f5ee; color: #2d9c55; cursor: pointer; }
  </style>
</head>
<body>
<div id="loginSection"><h2>Admin Login</h2><input type="email" id="email" placeholder="Email"><input type="password" id="password" placeholder="Password"><button class="btn-save" onclick="login()">Login</button></div>
<div id="dashboardSection">
  <div class="sidebar">
    <h2 style="padding:20px;">Control Panel</h2>
    <button onclick="switchTab('sports')">🏆 Sports Control</button>
    <button onclick="switchTab('facs')">🏗️ Facility Manager</button>
    <button onclick="switchTab('notices')">📢 PDF Notices</button>
    <button onclick="logout()" style="margin-top:auto; color:#ff9999;">Logout</button>
  </div>
  <div class="main">
    <div id="tab-sports" class="tab active">
      <div class="card"><h3>Master Schedule Control</h3><input type="date" id="adminDate" onchange="loadAdmin()" style="width:200px;"><div style="overflow-x:auto; margin-top:20px;"><table><thead><tr id="adminHead"><th>Facility</th></tr></thead><tbody id="adminBody"></tbody></table></div></div>
    </div>
    <div id="tab-facs" class="tab">
      <div class="card"><h3>Add Facility</h3><input type="text" id="fName" placeholder="Name"><button class="btn-save" onclick="addFac()">Add</button></div>
      <div class="card"><h3>Active Grounds</h3><div id="facList"></div></div>
    </div>
    <div id="tab-notices" class="tab">
      <div class="card"><h3>Post PDF Notice</h3><input type="text" id="nTitle" placeholder="Title"><input type="file" id="nFile" accept="application/pdf"><button class="btn-save" id="upBtn" onclick="uploadPDF()">Upload PDF Notice</button></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";
  import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-storage.js";

  const firebaseConfig = { apiKey: "AIzaSyAcBGrOG5cfRRSrIsSFykV8BNo2Gc0VVcU", authDomain: "sind-society.firebaseapp.com", projectId: "sind-society", storageBucket: "sind-society.firebasestorage.app", messagingSenderId: "821689204364", appId: "1:821689204364:web:68aa0db383e84b051145a9" };
  const app = initializeApp(firebaseConfig); const auth = getAuth(app); const db = getFirestore(app); const storage = getStorage(app);
  const times = ["6 AM", "7 AM", "8 AM", "9 AM", "10 AM", "11 AM", "12 PM", "1 PM", "2 PM", "3 PM", "4 PM", "5 PM", "6 PM", "7 PM", "8 PM", "9 PM", "10 PM", "11 PM"];
  
  document.getElementById('adminDate').value = new Date().toISOString().split('T')[0];
  times.forEach(t => document.getElementById('adminHead').innerHTML += `<th>${t}</th>`);

  window.login = () => signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value).catch(e => alert(e.message));
  window.logout = () => signOut(auth);
  onAuthStateChanged(auth, u => { if(u){ document.getElementById('loginSection').style.display='none'; document.getElementById('dashboardSection').style.display='flex'; loadAdmin(); } else { document.getElementById('loginSection').style.display='block'; document.getElementById('dashboardSection').style.display='none'; } });

  async function loadAdmin() {
    const d = document.getElementById('adminDate').value, facs = await getDocs(collection(db, "facilities")), books = await getDocs(query(collection(db, "bookings"), where("date", "==", d)));
    const bMap = {}; books.forEach(doc => bMap[`${doc.data().facility}-${doc.data().time}`] = {id: doc.id, ...doc.data()});
    const body = document.getElementById('adminBody'); body.innerHTML = '';
    facs.forEach(doc => {
      const f = doc.data(); let row = `<tr><td style="text-align:left; font-weight:bold;">${f.name}</td>`;
      times.forEach(t => {
        const b = bMap[`${f.name}-${t}`];
        if(b) row += `<td class="${b.userName=='MAINTENANCE'?'status-maint':'status-booked'}" onclick="adminAct('${b.id}', true)">${b.userName=='MAINTENANCE'?'MAINT':b.userName}</td>`;
        else row += `<td class="status-free" onclick="adminAct('${f.name}|${t}|${d}', false)">Free</td>`;
      });
      body.innerHTML += row + '</tr>';
    });
    const fList = document.getElementById('facList'); fList.innerHTML = ''; facs.forEach(d => fList.innerHTML += `<div style="padding:10px; border-bottom:1px solid #eee; display:flex; justify-content:space-between;">${d.data().name} <button onclick="delFac('${d.id}')" style="color:red; background:none; border:1px solid red;">Del</button></div>`);
  }

  window.adminAct = async (data, exists) => {
    if(exists) { if(confirm("Cancel?")) { await deleteDoc(doc(db, "bookings", data)); loadAdmin(); } }
    else { if(confirm("Block for Maintenance?")) { const [f, t, d] = data.split('|'); await addDoc(collection(db, "bookings"), { facility: f, time: t, date: d, userName: "MAINTENANCE", bungalow: "ADMIN" }); loadAdmin(); } }
  };
  window.addFac = async () => { await addDoc(collection(db, "facilities"), { name: document.getElementById('fName').value }); document.getElementById('fName').value=''; loadAdmin(); };
  window.delFac = async (id) => { if(confirm("Delete Facility?")) { await deleteDoc(doc(db, "facilities", id)); loadAdmin(); } };
  window.uploadPDF = async () => {
    const file = document.getElementById('nFile').files[0], title = document.getElementById('nTitle').value; if(!file) return alert("Pick PDF");
    document.getElementById('upBtn').innerText = "Uploading...";
    const refS = ref(storage, 'notices/'+Date.now()+'_'+file.name); await uploadBytes(refS, file);
    const url = await getDownloadURL(refS); await addDoc(collection(db, "notices"), { title: title, pdfUrl: url, date: new Date().toLocaleDateString() });
    alert("Posted"); document.getElementById('upBtn').innerText = "Upload PDF Notice"; loadAdmin();
  };
  window.switchTab = (id) => { document.querySelectorAll('.tab').forEach(t => t.classList.remove('active')); document.getElementById('tab-'+id).classList.add('active'); };
</script>
</body>
</html>
