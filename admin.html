<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Admin Portal | Sind Society Sports</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #0a3d2b; --bg: #faf8f3; --border: #ddd; --danger: #c0392b; --gold: #c9993a; }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); margin: 0; padding: 0; }
    
    /* Login */
    #loginSection { max-width: 400px; margin: 100px auto; background: white; padding: 40px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
    #loginSection input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid var(--border); border-radius: 6px; }
    #loginSection button { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }

    /* Dashboard Layout */
    #dashboardSection { display: none; display: flex; height: 100vh; }
    .sidebar { width: 260px; background: var(--primary); color: white; display: flex; flex-direction: column; flex-shrink: 0; }
    .sidebar h2 { padding: 25px; margin: 0; font-size: 20px; border-bottom: 1px solid rgba(255,255,255,0.1); }
    .tab-btn { background: none; border: none; color: rgba(255,255,255,0.7); padding: 18px 25px; text-align: left; font-size: 15px; cursor: pointer; transition: 0.2s; border-left: 4px solid transparent; }
    .tab-btn:hover, .tab-btn.active { background: rgba(255,255,255,0.1); color: white; border-left-color: var(--gold); }
    
    .main-content { flex: 1; padding: 40px; overflow-y: auto; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }

    /* UI Cards */
    .admin-card { background: white; padding: 25px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 30px; box-shadow: 0 2px 8px rgba(0,0,0,0.03); }
    h3 { margin-top: 0; color: var(--primary); border-bottom: 2px solid var(--gold); display: inline-block; padding-bottom: 5px; margin-bottom: 20px; }
    
    .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 8px; font-family: inherit; }
    .btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
    .btn-save { background: var(--primary); color: white; }
    .btn-block { background: var(--danger); color: white; }
    
    /* Table Styles */
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #eee; font-size: 14px; }
    th { background: #f8f9fa; color: var(--primary); font-weight: 700; }
    .del-btn { color: var(--danger); background: none; border: 1px solid var(--danger); padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; }
    .del-btn:hover { background: var(--danger); color: white; }
    
    .hidden { display: none !important; }
  </style>
</head>
<body>

<div id="loginSection">
  <h2>Sind Admin Login</h2>
  <input type="email" id="email" placeholder="Email">
  <input type="password" id="password" placeholder="Password">
  <button id="loginBtn">Access Dashboard</button>
</div>

<div id="dashboardSection">
  <div class="sidebar">
    <h2>Management</h2>
    <button class="tab-btn active" onclick="switchTab('sports')">🏆 Sports Manager</button>
    <button class="tab-btn" onclick="switchTab('notices')">📢 Notice Board</button>
    <button class="tab-btn" onclick="switchTab('residents')">👥 Residents</button>
    <button id="logoutBtn" class="tab-btn" style="margin-top:auto; color: #ff9999;">🚪 Log Out</button>
  </div>

  <div class="main-content">

    <div id="tab-sports" class="tab-content active">
      <div class="admin-card">
        <h3>Block Slots (Maintenance)</h3>
        <p style="font-size:13px; color:#666; margin-bottom:15px;">Use this to prevent residents from booking a specific ground during maintenance or private events.</p>
        <div class="form-row form-grid">
          <div><label>Date</label><input type="date" id="blockDate"></div>
          <div><label>Ground</label><select id="blockFac"></select></div>
          <div><label>Time Slot</label><select id="blockTime"></select></div>
        </div>
        <button class="btn btn-block" onclick="blockSlot()">Mark as Maintenance</button>
      </div>

      <div class="admin-card">
        <h3>Live Bookings & Maintenance</h3>
        <table id="bookingsTable">
          <thead>
            <tr>
              <th>Date</th>
              <th>Ground</th>
              <th>Time</th>
              <th>Resident / Status</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="bookingsBody"></tbody>
        </table>
      </div>

      <div class="admin-card">
        <h3>Configure Grounds</h3>
        <div class="form-grid">
          <input type="text" id="facName" placeholder="New Facility Name">
          <input type="text" id="facIcon" placeholder="Emoji (e.g. 🎾)">
        </div>
        <button class="btn btn-save" onclick="addFacility()">Add New Facility</button>
      </div>
    </div>

    <div id="tab-notices" class="tab-content">
      <div class="admin-card">
        <h3>Post Notice</h3>
        <input type="text" id="notTitle" placeholder="Title" style="margin-bottom:10px;">
        <textarea id="notDesc" placeholder="Description" rows="3"></textarea><br><br>
        <button class="btn btn-save" onclick="addNotice()">Post to Board</button>
      </div>
    </div>

    <div id="tab-residents" class="tab-content">
      <div class="admin-card">
        <h3>Add Resident</h3>
        <div class="form-grid">
          <input type="text" id="resName" placeholder="Name">
          <input type="text" id="resBung" placeholder="Bungalow No.">
        </div>
        <button class="btn btn-save" onclick="addResident()">Add to Directory</button>
      </div>
    </div>

  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, orderBy } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAcBGrOG5cfRRSrIsSFykV8BNo2Gc0VVcU",
    authDomain: "sind-society.firebaseapp.com",
    projectId: "sind-society",
    storageBucket: "sind-society.firebasestorage.app",
    messagingSenderId: "821689204364",
    appId: "1:821689204364:web:68aa0db383e84b051145a9"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getFirestore(app);

  const times = ["6 AM", "7 AM", "8 AM", "9 AM", "10 AM", "11 AM", "12 PM", "1 PM", "2 PM", "3 PM", "4 PM", "5 PM", "6 PM", "7 PM", "8 PM", "9 PM", "10 PM", "11 PM"];

  // Populate Times
  times.forEach(t => document.getElementById('blockTime').innerHTML += `<option value="${t}">${t}</option>`);

  // Auth Logic
  onAuthStateChanged(auth, (user) => {
    if (user) {
      document.getElementById('loginSection').classList.add('hidden');
      document.getElementById('dashboardSection').style.display = 'flex';
      loadData();
    } else {
      document.getElementById('loginSection').classList.remove('hidden');
      document.getElementById('dashboardSection').style.display = 'none';
    }
  });

  document.getElementById('loginBtn').addEventListener('click', () => {
    const e = document.getElementById('email').value, p = document.getElementById('password').value;
    signInWithEmailAndPassword(auth, e, p).catch(err => alert(err.message));
  });
  document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));

  // --- DATA LOADING ---
  async function loadData() {
    const facSnap = await getDocs(collection(db, "facilities"));
    const bookSnap = await getDocs(query(collection(db, "bookings"), orderBy("date", "desc")));
    
    // Fill Grounds Select
    const blockFac = document.getElementById('blockFac');
    blockFac.innerHTML = '';
    facSnap.forEach(d => blockFac.innerHTML += `<option value="${d.data().name}">${d.data().name}</option>`);

    // Fill Bookings Table
    const body = document.getElementById('bookingsBody');
    body.innerHTML = '';
    bookSnap.forEach(d => {
      const b = d.data();
      const isMaint = b.userName === "MAINTENANCE";
      body.innerHTML += `
        <tr style="${isMaint ? 'background:#fff8f8' : ''}">
          <td>${b.date}</td>
          <td>${b.facility}</td>
          <td>${b.time}</td>
          <td><strong style="color:${isMaint ? 'var(--danger)' : '#333'}">${isMaint ? '⚠️ MAINTENANCE' : b.userName + ' (' + b.bungalow + ')'}</strong></td>
          <td><button class="del-btn" onclick="deleteBooking('${d.id}')">${isMaint ? 'Unlock' : 'Cancel'}</button></td>
        </tr>`;
    });
  }

  // --- ADMIN ACTIONS ---
  window.blockSlot = async () => {
    const d = document.getElementById('blockDate').value;
    const f = document.getElementById('blockFac').value;
    const t = document.getElementById('blockTime').value;
    if(!d) return alert("Select a date");

    await addDoc(collection(db, "bookings"), {
      facility: f, time: t, date: d, userName: "MAINTENANCE", bungalow: "ADMIN"
    });
    alert("Slot Blocked for Residents");
    loadData();
  };

  window.deleteBooking = async (id) => {
    if(confirm("Are you sure?")) {
      await deleteDoc(doc(db, "bookings", id));
      loadData();
    }
  };

  window.addFacility = async () => {
    const n = document.getElementById('facName').value, i = document.getElementById('facIcon').value;
    await addDoc(collection(db, "facilities"), { name: n, icon: i });
    alert("Facility Added"); loadData();
  };

  window.addNotice = async () => {
    await addDoc(collection(db, "notices"), { title: document.getElementById('notTitle').value, description: document.getElementById('notDesc').value, date: new Date().toLocaleDateString(), type: 'general' });
    alert("Notice Posted");
  };

  window.addResident = async () => {
    await addDoc(collection(db, "residents"), { name: document.getElementById('resName').value, bungalow: document.getElementById('resBung').value });
    alert("Resident Added");
  };

  window.switchTab = (id) => {
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-'+id).classList.add('active');
    event.currentTarget.classList.add('active');
  };

  window.loadData = loadData;
</script>
</body>
</html>
